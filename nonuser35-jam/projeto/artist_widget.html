<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>nonuser35 player</title>
    <script src="dados_artista.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: transparent;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;
        }

        .main-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 336px;
            height: 100%;
            min-width: 336px;
            max-width: 336px;
            padding: 0;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            overflow: hidden;
            isolation: isolate;
        }

        .widget-container {
            position: relative;
            width: 336px;
            min-width: 336px;
            height: 214px;
            min-height: 214px;
            flex: 0 0 214px;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            border: 0;
            z-index: 100;
            background:
                radial-gradient(circle at 22% 24%, rgba(57,255,20,0.18), transparent 36%),
                radial-gradient(circle at 74% 22%, rgba(0,230,255,0.16), transparent 40%),
                linear-gradient(180deg, rgba(8, 16, 13, 0.72), rgba(4, 8, 7, 0.62));
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: var(--slide-position, center center);
            opacity: 0;
            transform: scale(var(--slide-idle-scale, 1.06));
            filter: saturate(1.02);
            transition: opacity 1.5s ease-in-out, transform 6.8s ease, filter 6.8s ease;
            z-index: 2;
        }

        .slide.is-unavailable {
            display: none;
        }

        .slide.active {
            opacity: 1;
            transform: scale(var(--slide-active-scale, 1));
            filter: saturate(1.08);
        }

        .ticker-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 48px;
            z-index: 10;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .ticker-text {
            position: relative;
            display: inline-block;
            white-space: nowrap;
            color: rgba(250, 252, 255, 0.98);
            font-family: "Georgia", "Cambria", "Times New Roman", serif;
            font-size: 14.5px;
            font-weight: 600;
            font-style: normal;
            letter-spacing: 0.18px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.42);
            transform: translate3d(0, 0, 0);
            will-change: transform;
            backface-visibility: hidden;
            font-feature-settings: "liga" 1, "kern" 1;
            text-rendering: optimizeLegibility;
        }

        .social-container {
            position: relative;
            padding: 14px 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 1;
            max-width: 100%;
            min-width: 0;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
            flex: 1 1 auto;
            min-height: 0;
            isolation: isolate;
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.22) transparent;
        }

        .social-container.is-dense {
            padding: 10px 12px 14px;
            gap: 8px;
        }

        .social-container.is-packed {
            padding: 8px 10px 12px;
            gap: 6px;
        }

        .social-container::-webkit-scrollbar {
            width: 8px;
        }

        .social-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .social-container::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
        }

        .venue-bg-stage {
            position: absolute;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .venue-bg-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            overflow: hidden;
            transform: scale(var(--venue-idle-scale, 1.04));
            transition: opacity 420ms ease, transform 7s ease, background-position 480ms ease;
        }

        .venue-bg-slide.active {
            opacity: 0.92;
            transform: scale(var(--venue-active-scale, 1));
        }

        .venue-bg-fill,
        .venue-bg-focus {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        .venue-bg-fill {
            inset: -10px;
            background-size: cover;
            background-position: var(--venue-position, center center);
            filter: blur(16px) saturate(0.92) brightness(0.72);
            transform: scale(1.12);
        }

        .venue-bg-focus {
            background-size: contain;
            background-position: center center;
            opacity: 0.96;
            transform: scale(0.98);
        }

        .social-container.single-venue-image .venue-bg-slide.active {
            animation: venueDrift 10s ease-in-out infinite alternate;
        }

        @keyframes venueDrift {
            0% {
                transform: scale(var(--venue-active-scale, 1)) translate3d(0, 0, 0);
            }
            100% {
                transform: scale(calc(var(--venue-active-scale, 1) + 0.035)) translate3d(-6px, -3px, 0);
            }
        }

        .social-container::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(180deg, rgba(6, 10, 12, 0.54), rgba(6, 10, 12, 0.72)),
                radial-gradient(circle at 20% 18%, rgba(255,255,255,0.08), transparent 42%);
            backdrop-filter: blur(8px) saturate(1.04);
            -webkit-backdrop-filter: blur(8px) saturate(1.04);
            transition: background 360ms ease, backdrop-filter 360ms ease;
        }

        .social-container.has-venue-image::after {
            background:
                linear-gradient(180deg, rgba(6, 10, 12, 0.06), rgba(6, 10, 12, 0.14)),
                linear-gradient(135deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .social-item {
            display: grid;
            grid-template-columns: 20px minmax(0, 1fr);
            align-items: start;
            gap: 10px;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.82);
            font-size: 12.5px;
            font-style: normal;
            text-decoration: none;
            line-height: 1.46;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.24);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
        }

        .social-container.is-dense .social-item {
            padding: 8px 10px;
            gap: 8px;
            border-radius: 14px;
            font-size: 11.8px;
            line-height: 1.34;
        }

        .social-container.is-packed .social-item {
            padding: 7px 9px;
            gap: 7px;
            border-radius: 12px;
            font-size: 11.2px;
            line-height: 1.28;
        }

        .social-item > span {
            font-style: normal;
            margin-right: 0;
            margin-top: 2px;
            font-size: 12px;
            min-width: 18px;
            color: rgba(255, 255, 255, 0.98);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .social-container.is-dense .social-item > span {
            margin-top: 1px;
            font-size: 11px;
            min-width: 16px;
        }

        .social-container.is-packed .social-item > span {
            margin-top: 0;
            font-size: 10px;
            min-width: 15px;
        }

        .social-item small span {
            display: block;
            min-width: 0;
            max-width: 100%;
            margin: 0;
            font-size: inherit;
            font-weight: 400;
            line-height: 1.46;
            color: rgba(255, 255, 255, 0.88);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .social-item .event-title {
            display: block;
            margin: 2px 0 4px;
            color: rgba(255, 248, 224, 0.96);
            font-family: "Georgia", "Cambria", "Times New Roman", serif;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.24;
            letter-spacing: 0.01em;
            text-wrap: balance;
        }

        .social-container.is-dense .social-item .event-title {
            margin: 1px 0 3px;
            font-size: 12.2px;
            line-height: 1.18;
        }

        .social-container.is-packed .social-item .event-title {
            margin: 1px 0 2px;
            font-size: 11.6px;
            line-height: 1.14;
        }

        .social-item small {
            display: block;
            min-width: 0;
            width: 100%;
            max-width: 100%;
            line-height: 1.46;
            word-break: break-word;
            overflow-wrap: anywhere;
            color: rgba(255, 255, 255, 0.82);
            font-family: "Segoe UI", "Inter", sans-serif;
        }

        .social-container.is-dense .social-item small,
        .social-container.is-dense .social-item small span {
            line-height: 1.32;
        }

        .social-container.is-packed .social-item small,
        .social-container.is-packed .social-item small span {
            line-height: 1.24;
        }

        .social-item b {
            display: block;
            margin-right: 0;
            margin-bottom: 2px;
            color: rgba(239, 247, 242, 0.78);
            font-weight: 700;
            font-style: normal;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 9.5px;
        }

        .social-container.is-dense .social-item b {
            margin-bottom: 1px;
            font-size: 9px;
            letter-spacing: 0.07em;
        }

        .social-container.is-packed .social-item b {
            margin-bottom: 1px;
            font-size: 8.3px;
            letter-spacing: 0.06em;
        }

        .context-fallback {
            display: flex;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(239, 247, 242, 0.88);
            line-height: 1.4;
        }

        .context-fallback b {
            color: rgba(255,255,255,0.96);
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="widget-container">
            <div class="slides-layer" id="slides-box">
                <div class="slide active" style="background-image: url('img_artista/foto1.jpg');"></div>
                <div class="slide" style="background-image: url('img_artista/foto2.jpg');"></div>
                <div class="slide" style="background-image: url('img_artista/foto3.jpg');"></div>
                <div class="slide" style="background-image: url('img_artista/foto4.jpg');"></div>
                <div class="slide" style="background-image: url('img_artista/foto5.jpg');"></div>
            </div>

            <div class="ticker-container" id="ticker-box">
                <div class="ticker-text" id="txt-info"></div>
            </div>
            <div class="context-fallback" id="context-row" style="display: none;">
                <small>
                    <b>Contexto da jam</b>
                    <span id="context-txt">Os detalhes do artista ainda estão sendo organizados para esta faixa.</span>
                </small>
            </div>
        </div>

        <div class="social-container" id="social-box">
            <div class="venue-bg-stage" id="venue-bg-stage"></div>
            <div class="social-item" id="site-row" style="display: none;">
                <span>↗</span><small><b>Site</b><span id="site-txt"></span></small>
            </div>
            <div class="social-item" id="insta-row" style="display: none;">
                <span>◎</span><small><b>Instagram</b><span id="insta-txt"></span></small>
            </div>
            <div class="social-item" id="status-row" style="display: none;">
                <span>◦</span><small><b>Status</b><span id="status-txt"></span></small>
            </div>
            <div class="social-item" id="agenda-row" style="display: none;">
                <span>→</span><small><b>Próximo show</b><em class="event-title" id="agenda-title" style="display: none;"></em><span id="agenda-txt"></span></small>
            </div>
            <div class="social-item" id="ultimo-row" style="display: none;">
                <span>←</span><small><b>Último show</b><em class="event-title" id="ultimo-title" style="display: none;"></em><span id="ultimo-txt"></span></small>
            </div>
        </div>
    </div>

    <script>
        let curiosidades = [];
        let slideIdx = 0;
        let availableSlideIndices = [];
        let infoIdx = 0;
        let tickerAnimationFrame = null;
        let tickerOffset = 0;
        let tickerLastTs = 0;
        let tickerNeedsReset = true;
        const assetVersion = new URLSearchParams(window.location.search).get("ts") || Date.now().toString();
        const infoElement = document.getElementById("txt-info");
        const tickerBox = document.getElementById("ticker-box");
        const socialBox = document.getElementById("social-box");
        const venueBgStage = document.getElementById("venue-bg-stage");
        const defaultTickerMessage = "'Contexto do artista em atualizacao para esta faixa.'";
        let venueImages = [];
        let venueIdx = 0;
        let venueTimer = null;

        function stopVenueCarousel() {
            if (venueTimer) {
                clearTimeout(venueTimer);
                venueTimer = null;
            }
        }

        function renderVenueSlides() {
            if (!venueBgStage) return;
            venueBgStage.innerHTML = "";
            venueImages.forEach((image, idx) => {
                const slide = document.createElement("div");
                slide.className = `venue-bg-slide${idx === venueIdx ? " active" : ""}`;
                const safeImage = String(image).replace(/'/g, "\\'");
                const fill = document.createElement("div");
                fill.className = "venue-bg-fill";
                fill.style.backgroundImage = `url('${safeImage}')`;
                const focus = document.createElement("div");
                focus.className = "venue-bg-focus";
                focus.style.backgroundImage = `url('${safeImage}')`;
                const probe = new Image();
                probe.onload = () => {
                    const naturalWidth = Number(probe.naturalWidth || 0);
                    const naturalHeight = Number(probe.naturalHeight || 0);
                    const aspectRatio = naturalWidth > 0 && naturalHeight > 0 ? naturalWidth / naturalHeight : 1;

                    slide.style.removeProperty("--venue-position");
                    slide.style.removeProperty("--venue-idle-scale");
                    slide.style.removeProperty("--venue-active-scale");

                    if (aspectRatio > 0 && aspectRatio < 0.92) {
                        slide.style.setProperty("--venue-position", "center 14%");
                        slide.style.setProperty("--venue-idle-scale", "1.08");
                        slide.style.setProperty("--venue-active-scale", "1.03");
                    } else if (aspectRatio < 1.18) {
                        slide.style.setProperty("--venue-position", "center 18%");
                        slide.style.setProperty("--venue-idle-scale", "1.06");
                        slide.style.setProperty("--venue-active-scale", "1.02");
                    } else {
                        slide.style.setProperty("--venue-position", "center 28%");
                        slide.style.setProperty("--venue-idle-scale", "1.05");
                        slide.style.setProperty("--venue-active-scale", "1");
                    }
                };
                probe.src = image;
                slide.appendChild(fill);
                slide.appendChild(focus);
                venueBgStage.appendChild(slide);
            });
        }

        function queueVenueCarousel() {
            stopVenueCarousel();
            if (venueImages.length <= 1) return;
            venueTimer = setTimeout(() => {
                venueIdx = (venueIdx + 1) % venueImages.length;
                renderVenueSlides();
                queueVenueCarousel();
            }, 4200);
        }

        function applyVenueContextImage() {
            if (!socialBox || typeof dadosArtista === "undefined") return;

            const localImageList = Array.isArray(dadosArtista.venue_local_images)
                ? dadosArtista.venue_local_images
                : [];
            const imageList = Array.isArray(dadosArtista.venue_image_urls)
                ? dadosArtista.venue_image_urls
                : [];
            const fallbackImage = String(dadosArtista.venue_image_url || dadosArtista.venue_image || "").trim();
            venueImages = localImageList.map((item) => String(item || "").trim()).filter(Boolean);
            if (!venueImages.length) {
                venueImages = imageList.map((item) => String(item || "").trim()).filter(Boolean);
            }
            if (!venueImages.length && fallbackImage) {
                venueImages = [fallbackImage];
            }

            if (!venueImages.length) {
                stopVenueCarousel();
                socialBox.classList.remove("has-venue-image");
                socialBox.classList.remove("single-venue-image");
                if (venueBgStage) venueBgStage.innerHTML = "";
                return;
            }

            venueIdx = 0;
            renderVenueSlides();
            socialBox.classList.add("has-venue-image");
            socialBox.classList.toggle("single-venue-image", venueImages.length === 1);
            queueVenueCarousel();
        }

        function updateSocialDensity() {
            if (!socialBox) return;

            const rows = Array.from(socialBox.querySelectorAll(".social-item"))
                .filter((node) => getComputedStyle(node).display !== "none");

            const totalChars = rows.reduce((sum, node) => sum + (node.innerText || "").trim().length, 0);
            const hasBothShows = rows.some((node) => node.id === "agenda-row") && rows.some((node) => node.id === "ultimo-row");
            const shouldDense = rows.length >= 4 || totalChars > 240 || hasBothShows;

            socialBox.classList.toggle("is-dense", shouldDense);
            socialBox.classList.remove("is-packed");

            requestAnimationFrame(() => {
                if (!socialBox) return;
                const overflow = socialBox.scrollHeight - socialBox.clientHeight;
                socialBox.classList.toggle("is-packed", shouldDense && overflow > 10);
            });
        }

        function aplicarMidias() {
            const slides = document.querySelectorAll(".slide");
            const imagens = [
                `img_artista/foto1.jpg?ts=${assetVersion}`,
                `img_artista/foto2.jpg?ts=${assetVersion}`,
                `img_artista/foto3.jpg?ts=${assetVersion}`,
                `img_artista/foto4.jpg?ts=${assetVersion}`,
                `img_artista/foto5.jpg?ts=${assetVersion}`
            ];

            slides.forEach((slide, idx) => {
                const imagem = imagens[idx] || "";
                slide.style.backgroundImage = "";
                slide.classList.add("is-unavailable");
                if (!imagem) {
                    return;
                }

                const probe = new Image();
                probe.onload = () => {
                    const naturalWidth = Number(probe.naturalWidth || 0);
                    const naturalHeight = Number(probe.naturalHeight || 0);
                    const aspectRatio = naturalWidth > 0 && naturalHeight > 0 ? naturalWidth / naturalHeight : 1;

                    slide.style.removeProperty("--slide-position");
                    slide.style.removeProperty("--slide-idle-scale");
                    slide.style.removeProperty("--slide-active-scale");

                    if (aspectRatio > 0 && aspectRatio < 0.92) {
                        slide.style.setProperty("--slide-position", "center 18%");
                        slide.style.setProperty("--slide-idle-scale", "1.025");
                        slide.style.setProperty("--slide-active-scale", "1");
                    } else if (aspectRatio < 1.15) {
                        slide.style.setProperty("--slide-position", "center 24%");
                        slide.style.setProperty("--slide-idle-scale", "1.035");
                        slide.style.setProperty("--slide-active-scale", "1");
                    } else {
                        slide.style.setProperty("--slide-position", "center center");
                        slide.style.setProperty("--slide-idle-scale", "1.055");
                        slide.style.setProperty("--slide-active-scale", "1");
                    }

                    slide.style.backgroundImage = `url('${imagem}')`;
                    slide.classList.remove("is-unavailable");
                    rebuildAvailableSlides();
                };
                probe.onerror = () => {
                    slide.style.backgroundImage = "";
                    slide.classList.add("is-unavailable");
                    rebuildAvailableSlides();
                };
                probe.src = imagem;
            });
        }

        function rebuildAvailableSlides() {
            const slides = Array.from(document.querySelectorAll(".slide"));
            availableSlideIndices = slides
                .map((slide, idx) => (!slide.classList.contains("is-unavailable") ? idx : -1))
                .filter((idx) => idx >= 0);

            slides.forEach((slide) => slide.classList.remove("active"));

            if (availableSlideIndices.length === 0) {
                slideIdx = 0;
                return;
            }

            const safeIndex = availableSlideIndices.includes(slideIdx)
                ? slideIdx
                : availableSlideIndices[0];

            slideIdx = safeIndex;
            slides[safeIndex].classList.add("active");
        }

        function checarDados() {
            if (typeof dadosArtista === "undefined") {
                setTimeout(checarDados, 500);
                return;
            }

            applyVenueContextImage();

            if (dadosArtista.curiosidades && dadosArtista.curiosidades.length >= 2) {
                curiosidades = dadosArtista.curiosidades.map((c) => `'${c}'`);
                infoElement.innerText = curiosidades[0];
                startTickerLoop();
            } else {
                curiosidades = [defaultTickerMessage];
                infoElement.innerText = curiosidades[0];
                document.getElementById("ticker-box").style.display = "flex";
                tickerNeedsReset = true;
            }

            if (dadosArtista.website) {
                document.getElementById("site-txt").innerText = dadosArtista.website;
                document.getElementById("site-row").style.display = "grid";
            }

            if (dadosArtista.instagram) {
                document.getElementById("insta-txt").innerText = dadosArtista.instagram;
                document.getElementById("insta-row").style.display = "grid";
            }

            if (dadosArtista.status) {
                document.getElementById("status-txt").innerText = dadosArtista.status;
                document.getElementById("status-row").style.display = "grid";
            }

            const agendaRow = document.getElementById("agenda-row");
            const agendaTxt = document.getElementById("agenda-txt");
            const agendaTitle = document.getElementById("agenda-title");
            if (dadosArtista.proximo_show) {
                if (agendaTitle) {
                    const titulo = String(dadosArtista.proximo_show_titulo || "").trim();
                    agendaTitle.innerText = titulo;
                    agendaTitle.style.display = titulo ? "block" : "none";
                }
                agendaTxt.innerText = dadosArtista.proximo_show;
                agendaRow.style.display = "grid";
            } else {
                if (agendaTitle) {
                    agendaTitle.innerText = "";
                    agendaTitle.style.display = "none";
                }
                agendaRow.style.display = "none";
            }

            const ultimoRow = document.getElementById("ultimo-row");
            const ultimoTxt = document.getElementById("ultimo-txt");
            const ultimoTitle = document.getElementById("ultimo-title");
            if (dadosArtista.ultimo_show) {
                if (ultimoTitle) {
                    const titulo = String(dadosArtista.ultimo_show_titulo || "").trim();
                    ultimoTitle.innerText = titulo;
                    ultimoTitle.style.display = titulo ? "block" : "none";
                }
                ultimoTxt.innerText = dadosArtista.ultimo_show;
                ultimoRow.style.display = "grid";
            } else {
                if (ultimoTitle) {
                    ultimoTitle.innerText = "";
                    ultimoTitle.style.display = "none";
                }
                ultimoRow.style.display = "none";
            }

            const hasContextRows = [
                document.getElementById("site-row"),
                document.getElementById("insta-row"),
                document.getElementById("status-row"),
                agendaRow,
                ultimoRow
            ].some((node) => node && node.style.display === "grid");

            const contextRow = document.getElementById("context-row");
            const contextTxt = document.getElementById("context-txt");
            if (contextRow && contextTxt) {
                contextRow.style.display = hasContextRows ? "none" : "flex";
                contextTxt.innerText = hasContextRows
                    ? ""
                    : "Ainda estamos montando links, agenda e sinais publicos do artista para esta faixa.";
            }

            updateSocialDensity();

            console.log("Interface atualizada com dados do artista.");
        }

        function carrossel() {
            const slides = document.querySelectorAll(".slide");
            if (availableSlideIndices.length > 1) {
                slides.forEach((slide) => slide.classList.remove("active"));
                const currentListIndex = Math.max(0, availableSlideIndices.indexOf(slideIdx));
                slideIdx = availableSlideIndices[(currentListIndex + 1) % availableSlideIndices.length];
                slides[slideIdx].classList.add("active");
            }
            const timing = Math.floor(Math.random() * (5200 - 3400 + 1)) + 3400;
            setTimeout(carrossel, timing);
        }

        function setTickerText(index) {
            if (!curiosidades.length) return;
            infoIdx = index % curiosidades.length;
            infoElement.innerText = curiosidades[infoIdx];
            tickerNeedsReset = true;
        }

        function resetTickerPosition() {
            const containerWidth = tickerBox?.clientWidth || 320;
            tickerOffset = containerWidth;
            infoElement.style.transform = `translate3d(${tickerOffset}px, 0, 0)`;
            tickerNeedsReset = false;
        }

        function stepTicker(ts) {
            if (!tickerBox || tickerBox.style.display === "none" || curiosidades.length <= 1) {
                tickerAnimationFrame = requestAnimationFrame(stepTicker);
                return;
            }

            if (!tickerLastTs) tickerLastTs = ts;
            const delta = Math.min(32, ts - tickerLastTs);
            tickerLastTs = ts;

            if (tickerNeedsReset) {
                resetTickerPosition();
            }

            const speed = 0.052;
            tickerOffset -= delta * speed;
            infoElement.style.transform = `translate3d(${tickerOffset}px, 0, 0)`;

            const textWidth = infoElement.scrollWidth || 0;
            if ((tickerOffset + textWidth) < -24) {
                setTickerText((infoIdx + 1) % curiosidades.length);
            }

            tickerAnimationFrame = requestAnimationFrame(stepTicker);
        }

        function startTickerLoop() {
            if (tickerAnimationFrame) return;
            tickerLastTs = 0;
            tickerAnimationFrame = requestAnimationFrame(stepTicker);
        }

        aplicarMidias();
        checarDados();
        setTimeout(carrossel, 2200);
    </script>
</body>
</html>
